name: Deploy CTX Technology

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out public source
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble public site
        run: |
          rm -rf _site
          mkdir _site
          cp index.html core.html shield.html signal.html forge.html essential.html _site/
          cp checkout.html confirmation.html _site/
          cp *.css *.js favicon.svg _site/
          if [ -f CNAME ]; then cp CNAME _site/; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
